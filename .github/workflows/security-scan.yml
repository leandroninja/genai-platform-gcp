# ============================================================
# security-scan.yml
# Scan completo de segurança: Trivy (imagens), Semgrep (Python),
# Gitleaks (segredos). Executado em PRs e diariamente.
# ============================================================

name: "Security Scan — Trivy + Semgrep + Gitleaks"

on:
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Executa diariamente às 03:00 UTC (00:00 BRT)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  # ------------------------------------------------------------------
  # Job 1: Trivy — Scan de vulnerabilidades nas imagens Docker
  # ------------------------------------------------------------------
  trivy-scan:
    name: "Trivy — Vulnerabilidades em Imagens Docker"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        app: [rag-pipeline, agent-api]

    steps:
      - name: "Checkout do repositório"
        uses: actions/checkout@v4

      - name: "Build imagem Docker — ${{ matrix.app }}"
        run: |
          docker build \
            -t genai-${{ matrix.app }}:scan \
            apps/${{ matrix.app }}/

      - name: "Trivy — Scan de vulnerabilidades na imagem"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "genai-${{ matrix.app }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.app }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

      - name: "Upload resultados Trivy ao GitHub Security"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.app }}.sarif"
          category: "trivy-${{ matrix.app }}"

      # Também escanear o sistema de arquivos (dependências)
      - name: "Trivy — Scan de dependências Python (${{ matrix.app }})"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "apps/${{ matrix.app }}"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

  # ------------------------------------------------------------------
  # Job 2: Semgrep — Análise estática de código Python
  # ------------------------------------------------------------------
  semgrep:
    name: "Semgrep — Análise Estática Python"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout do repositório"
        uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Instalar Semgrep"
        run: pip install semgrep==1.68.0

      - name: "Semgrep — Scan Python"
        run: |
          semgrep \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/owasp-top-ten" \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            apps/ \
          || true

          # Saída legível para o log
          semgrep \
            --config "p/python" \
            --config "p/secrets" \
            apps/ \
            --severity WARNING \
          2>&1 | tee semgrep-output.txt || true

      - name: "Upload resultados Semgrep ao GitHub Security"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: "Resumo Semgrep"
        if: always()
        run: |
          echo "## Semgrep — Resultado" >> $GITHUB_STEP_SUMMARY
          if [ -f semgrep-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat semgrep-output.txt | tail -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ------------------------------------------------------------------
  # Job 3: Gitleaks — Detecção de segredos no histórico Git
  # ------------------------------------------------------------------
  secret-scan:
    name: "Gitleaks — Detecção de Segredos"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout do repositório (histórico completo)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Gitleaks — Scan de segredos"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: "--exit-code=0 --report-format=sarif --report-path=gitleaks-results.sarif"

      - name: "Upload resultados Gitleaks ao GitHub Security"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

  # ------------------------------------------------------------------
  # Job 4: Dependency Review (apenas em PRs)
  # ------------------------------------------------------------------
  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: "Checkout do repositório"
        uses: actions/checkout@v4

      - name: "Dependency Review — verificar dependências com CVEs"
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ------------------------------------------------------------------
  # Job 5: Resumo consolidado de segurança
  # ------------------------------------------------------------------
  security-summary:
    name: "Resumo de Segurança"
    runs-on: ubuntu-latest
    needs: [trivy-scan, semgrep, secret-scan]
    if: always()

    steps:
      - name: "Gerar resumo consolidado"
        run: |
          echo "## Resumo do Scan de Segurança" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Ferramenta | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy (imagens Docker) | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep (código Python) | ${{ needs.semgrep.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks (segredos) | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Resultados detalhados disponíveis na aba **Security** do repositório." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Executado: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
