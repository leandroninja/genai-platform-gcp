name: CI — Lint e Validação

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ruff
        run: pip install ruff==0.4.0

      - name: Ruff — lint Python
        run: |
          ruff check apps/ --select E,F,W --ignore E501,F821,F401 \
            --output-format=github \
          || true
        continue-on-error: true

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -recursive

      - name: Terraform init + validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout (histórico completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detecta secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Setup Python para checkov
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkov — IaC security
        run: |
          pip install checkov
          checkov \
            --directory terraform \
            --framework terraform \
            --output sarif \
            --soft-fail \
            --compact \
            > checkov-results.sarif 2>/dev/null || true
        continue-on-error: true

      - name: Upload Checkov para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov-genai
        continue-on-error: true
